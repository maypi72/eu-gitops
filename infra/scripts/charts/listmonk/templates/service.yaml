apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.activeName }}
  labels:
    app.kubernetes.io/name: {{ include "listmonk.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "listmonk.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.previewName }}
  labels:
    app.kubernetes.io/name: {{ include "listmonk.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "listmonk.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
