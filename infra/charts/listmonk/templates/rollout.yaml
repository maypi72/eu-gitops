{{- if .Values.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "listmonk.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "listmonk.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "listmonk.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    blueGreen:
      activeService: {{ .Values.service.activeName }}
      previewService: {{ .Values.service.previewName }}
      autoPromotionEnabled: {{ .Values.rollout.strategy.autoPromotionEnabled }}
{{- if gt (int .Values.rollout.strategy.autoPromotionSeconds) 0 }}
      autoPromotionSeconds: {{ .Values.rollout.strategy.autoPromotionSeconds }}
{{- end }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "listmonk.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
{{- with .Values.rollout.podAnnotations }}
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
      containers:
        - name: listmonk
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
{{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
{{- end }}
{{- if .Values.secrets.appSecretName }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.appSecretName }}
{{- end }}
          livenessProbe:
{{ toYaml .Values.livenessProbe | indent 12 }}
          readinessProbe:
{{ toYaml .Values.readinessProbe | indent 12 }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
      nodeSelector:
{{ toYaml .Values.rollout.nodeSelector | indent 8 }}
      tolerations:
{{ toYaml .Values.rollout.tolerations | indent 8 }}
      affinity:
{{ toYaml .Values.rollout.affinity | indent 8 }}
{{- end }}
