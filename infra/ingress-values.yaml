# Configuración optimizada para K3s en Laboratorio
controller:
  kind: DaemonSet
  # Publica 80/443 en el nodo para poder acceder por argocd.local sin NodePort ni LoadBalancer.
  hostNetwork: false
  dnsPolicy: ClusterFirst
  hostPort:
    enabled: true
  service:
    type: ClusterIP
  admissionWebhooks:
    enabled: false
  # Recursos recomendados para evitar que consuma mucho en la VM
  resources:
    requests:
      cpu: 100m
      memory: 90Mi