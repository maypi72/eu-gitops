name: Bootstrap Lab (K3s -> Argo CD)

on:
  workflow_dispatch:
    inputs:
      force_reinstall_k3s:
        description: "Forzar reinstalacion de K3s"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      calico_version:
        description: "Version de Calico"
        required: false
        default: "v3.27.2"
        type: string
      argocd_namespace:
        description: "Namespace destino de Argo CD"
        required: false
        default: "argocd"
        type: string
      argocd_release_name:
        description: "Nombre release Helm de Argo CD"
        required: false
        default: "argocd"
        type: string
      argocd_chart_version:
        description: "Version del chart argo/argo-cd"
        required: false
        default: "7.8.2"
        type: string
      argocd_values_file:
        description: "Ruta de values de Argo CD"
        required: false
        default: "bootstrap/values/argocd-values.yaml"
        type: string

permissions:
  contents: read

jobs:
  bootstrap-k3s:
    name: 1) Bootstrap K3s
    uses: ./.github/workflows/bootstrap-k3s.yml
    with:
      force_reinstall: ${{ inputs.force_reinstall_k3s }}
      calico_version: ${{ inputs.calico_version }}

  bootstrap-argocd:
    name: 2) Bootstrap Argo CD
    needs: bootstrap-k3s
    uses: ./.github/workflows/bootstrap-argocd.yml
    with:
      argocd_namespace: ${{ inputs.argocd_namespace }}
      argocd_release_name: ${{ inputs.argocd_release_name }}
      argocd_chart_version: ${{ inputs.argocd_chart_version }}
      values_file: ${{ inputs.argocd_values_file }}
